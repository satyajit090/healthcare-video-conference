server:
  port: 8080

spring:
  application:
    name: healthconnect-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/healthconnect}
    username: ${DB_USER:healthconnect}
    password: ${DB_PASSWORD:healthconnect}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: false
    open-in-view: false
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}

app:
  jwt:
    secret: ${JWT_SECRET:change-this-in-prod-a-very-long-256-bit-secret-key-0123456789abcdef}
    expiration-ms: 86400000
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}
  gemini:
    api-key: ${GEMINI_API_KEY:}
    model: ${GEMINI_MODEL:gemini-2.0-flash}
    base-url: https://generativelanguage.googleapis.com

logging:
  level:
    org.springframework.security: INFO
